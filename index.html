<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HTML Quiz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <div class="quiz-container">
    <div class="corner-accent"></div>

    <div class="quiz-header">
      <div class="subtitle">Knowledge Assessment</div>
      <h2>HTML Mastery Quiz</h2>
    </div>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-info">
        <span class="q-num" id="qNum">Question 1 of 10</span>
        <span id="qScore">0 answered</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width:10%"></div>
      </div>
    </div>

    <div id="quiz-box"></div>

    <div class="btn-row" id="btnRow">
      <button class="quiz-btn btn-back" id="backBtn" disabled>← Back</button>
      <button class="quiz-btn btn-next" id="nextBtn">Next →</button>
    </div>

    <button class="quiz-btn btn-submit d-none" id="submitBtn">Submit Quiz</button>

    <div id="result"></div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
